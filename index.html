rico de 102,63% do CDI em 2024 e 100,39% em 2025. Deixar caixa em conta corrente ou em produto com taxa mais alta é simplesmente abrir mão desse spread sem nenhuma contrapartida.\"\n\n---\n\n### 2. Versão 2 minutos (reunião curta)\n\n**Por que agora**\n\nO Copom se reúne em 17/06 e o mercado debate não mais \"quanto cortar\", mas \"quando pausar\" — o BTG projeta Selic encerrando 2026 em 13,75%, o Santander em 13,25%. Em qualquer dos dois cenários, a Selic permanece acima de 13% por pelo menos os próximos 6 meses, entregando carrego nominal de 14,5% a.a. com risco mínimo. É exatamente por isso que Santander, BTG e XP convergem em overweight em pós-fixados neste momento: raramente o CDI pagou tanto com tão pouca volatilidade de curva. O DI Advanced é o instrumento mais direto pra capturar esse posicionamento dentro da gestão Santander Asset.\n\n**Estratégia e diferencial**\n\nO fundo é um FIC referenciado ao CDI que alocaa em LFTs, compromissadas, letras financeiras, debêntures e FIDCs — todos grau de investimento, com duração baixa. O diferencial em relação a um fundo DI soberano puro é justamente o componente de crédito privado, que gera o pequeno prêmio sobre o CDI observado no histórico, dentro de uma carteira com R$ 19,8 bilhões de PL — escala que permite negociação e diversificação que fundos menores não alcançam.\n\n**Desempenho e posicionamento**\n\nO fundo entregou 102,63% do CDI em 2024 e 100,39% em 2025, com acumulado de 36 meses em 44,80% vs. CDI de 43,75% — ou seja, retorno acima do benchmark na janela longa. ⚠️ Em períodos de estresse de crédito, como dezembro/2024, o retorno ficou em 91,53% do CDI — esse é o custo do componente privado, e voltamos a isso nas objeções. Rentabilidade passada não garante resultado futuro.\n\n**Pra quem é**\n\nAdequado para qualquer perfil API como âncora de caixa ou alocação defensiva. Aplicação mínima de R$ 100, público geral, cotização e liquidação em D+0 — funciona tanto para alocação de caixa operacional quanto como posição tática de espera enquanto o cenário de duration se define.\n\n**Custos e liquidez**\n\nTaxa de administração de 0,30% a.a. (0,003 em fração decimal — já verificado). Sem taxa de performance. Aplicação, resgate e crédito em D+0 — liquidez total, sem carência. A taxa é competitiva para um fundo com essa escala e gestão ativa de crédito privado; o custo de um fundo DI soberano puro comparável costuma estar em faixa similar, sem o prêmio adicional de crédito.\n\n---\n\n### 3. Versão 5 minutos (conteúdo aditivo)\n\n**Cenário macro completo**\n\nAs três casas — Santander, BTG e XP — estão alinhadas num ponto incomum: pós-fixado em overweight, com carrego real positivo relevante e liquidez como argumento central. O IPCA-15 de maio surpreendeu negativamente em núcleos; o componente Livres em MM3M anualizado está em 6,92% (BTG), muito acima da meta de 3%, com fertilizantes +57% no ano pressionando alimentos estruturalmente. O petróleo acima de US$ 100/barril sustenta pressão inflacionária global e o Fed mantém Fed Funds em 3,75% — sem espaço para cortes nos EUA em 2026. Para o DI Advanced, esse cenário é diretamente favorável: Selic mais alta por mais tempo significa que o fundo carrega mais, por mais tempo, com risco de duration praticamente zero. O risco de estar no pós-fixado neste momento é essencialmente o oposto do risco de ter duration longa — e maio/2026, quando carteiras com duration elevada apanharam na marcação, demonstrou isso na prática.\n\n**Comportamento sob estresse**\n\nFundo de crédito privado de baixa duração marca a mercado. Em momentos de aversão a risco — abertura abrupta de spreads, eventos de crédito ou estresse sistêmico como o observado em março/2020 —, a carteira pode registrar retorno pontualmente abaixo do CDI ou até negativo, como o -0,17% de março/2020 e o 91,53% do CDI de dezembro/2024 registrados nos dados. Isso não é falha de gestão; é o custo do prêmio de crédito que o fundo captura nos demais meses. A mitigação está no PL elevado (R$ 19,8 bi), na diversificação da carteira e no foco rigoroso em grau de investimento — mas o risco de crédito privado existe e deve estar no radar do cliente, especialmente em cenários de deterioração rápida de fundamentos.\n\n**Mecânica tributária**\n\nPor ser um fundo aberto de Renda Fixa, o DI Advanced tem come-cotas semestral em maio e novembro — antecipação de IR à alíquota de 20% (prazo abaixo de 1 ano) ou 15% (acima de 2 anos), conforme a tabela regressiva. O come-cotas reduz o efeito dos juros compostos ao longo do tempo — para o cliente com horizonte longo e que não precisa do dinheiro, LCIs, LCAs ou fundos de infraestrutura isentos podem ser complementares, não substitutos. Aqui o DI Advanced tem papel de caixa e liquidez; a eficiência tributária máxima está em outros veículos da carteira, e o assessor deve posicionar isso claramente.\n\n**Comparação de classe**\n\nDentro da classe pós-fixado, o DI Advanced ocupa o espaço de caixa gerenciado com prêmio incremental: mais eficiente que conta corrente ou CDB de balcão sem gestão ativa, com liquidez equivalente a D+0. Fundos DI soberanos puros têm menor risco de crédito mas entregam exatamente o CDI bruto (sem prêmio de spread). Já fundos de crédito privado com duration maior ou rating médio mais baixo oferecem prêmio superior, mas assumem marcação mais volátil e menor liquidez. O DI Advanced está no ponto de equilíbrio entre liquidez, qualidade de crédito e carrego incremental — o que o torna a âncora natural de uma carteira que ainda está definindo duration no restante do portfólio.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"0,30% a.a. parece barato, mas CDB do banco ainda paga mais líquido.\"**\nEntendo — essa comparação aparece bastante. A diferença é que o DI Advanced tem D+0, gestão ativa de crédito com R$ 19,8 bi de PL e histórico de 102,63% do CDI em 2024 e 100,39% em 2025. Um CDB que paga 103% do CDI sem liquidez diária, concentrado em um único emissor, sem diversificação de carteira e sem FGC acima de R$ 250 mil, não é necessariamente mais eficiente — é mais arriscado numa base ajustada por liquidez e concentração. Para o caixa acima de R$ 250 mil, o fundo é estruturalmente mais seguro que um CDB de emissor único.\n\n**\"Em dezembro/2024 rendeu apenas 91,53% do CDI — isso é fraco.\"**\nSentiu isso, e é honesto apontar. O que aconteceu em dezembro/2024 foi uma abertura de spreads de crédito privado que afetou toda a indústria — não uma falha de gestão do fundo. No acumulado de 36 meses, o resultado foi 44,80% vs. 43,75% do CDI, acima do benchmark. O custo do componente de crédito privado é exatamente esse: meses pontuais de underperformance em troca de prêmio consistente ao longo do ciclo. O ponto de entrada no crédito privado, após a abertura de spreads, tende a ser o momento de melhor relação risco-retorno — não o pior.\n\n**\"E se o Copom pausar o ciclo de cortes? O CDI fica estagnado.\"**\nSe o BTG estiver certo e a Selic encerrar 2026 em 13,75%, o DI Advanced carrega ainda mais do que no cenário-base — a pausa no ciclo é literalmente o cenário favorável pra quem está em pós-fixado. O risco inverso — queda de Selic mais rápida do que o projetado — é o que tornaria a posição menos atrativa, mas todas as três casas descartam esse cenário em 2026 dado o nível de inflação de núcleos rodando acima de 6% anualizado.\n\n**\"Não tem FGC — tenho receio de crédito privado.\"**\nA ausência de FGC é real e deve ser dita claramente. A mitigação aqui não é garantia, é diversificação: com R$ 19,8 bilhões de PL, o fundo distribui o risco por dezenas de emissores high grade — a probabilidade de perda de capital por default em carteira dessa qualidade e escala é materialmente diferente da concentração num único CDB sem garantia. Mas se o cliente precisa de garantia nominal do capital, o produto certo é um CDB dentro do limite FGC, e devemos ser honestos sobre isso.\n\n**\"Já tenho renda fixa pós-fixada em outro produto.\"**\nO que importa é o custo total e a liquidez do que você já tem. Se a taxa de administração do produto atual for superior a 0,30% a.a., ou se a liquidez não for D+0, o DI Advanced é estritamente mais eficiente como caixa gerenciado. Se o que você tem é um CDB com liquidez no vencimento, os dois não se substituem — o fundo é o complemento líquido; o CDB é o carrego de prazo. Eles ocupam papéis distintos na carteira.\n\n**\"Come-cotas corrói o juro composto — prefiro LCI/LCA.\"**\nCerto — e para o horizonte longo, a LCI/LCA isenta de IR pode ser mais eficiente. O DI Advanced não compete com esse espaço; ele compete com o caixa de curto prazo e com a posição que precisa de liquidez imediata. LCI/LCA tem carência mínima, não tem D+0 e tem limite de emissão por banco — para o caixa ativo do portfólio, o fundo é o instrumento correto. Para o caixa com prazo definido e ticket que caiba na oferta disponível, a LCI/LCA complementa.\n\n---\n\n### 5. Ângulo comercial por perfil API\n\n- **Conservador:** Âncora natural de caixa — 0,30% a.a., D+0, CDI com prêmio de crédito gerenciado pela Santander Asset; base de liquidez antes de alocar em IPCA+ de prazo.\n- **Moderado:** Componente de liquidez da carteira enquanto o timing de duration em IPCA+ e prefixados se define; carrego de 14,5% a.a. sem abrir mão de flexibilidade de resgate.\n- **Balanceado:** Alinha à classe Pós-fixados em overweight da carteira-modelo Santander de junho/2026 — âncora estabilizadora que sustentou o perfil em maio enquanto duration e bolsa sofreram.\n- **Arrojado:** Produtividade de caixa: em vez de deixar liquidez parada entre movimentos táticos, o fundo trabalha o caixa a CDI+ sem custo de oportunidade.\n- **Agressivo:** Diversificação defensiva na base — o pós-fixado com liquidez é o colchão que permite manter posições agressivas em bolsa e alternativos sem precisar liquidar ativos em momento ruim.", "ultima_atualizacao": "2026-06-16"}, {"nome": "DI TOP RESP LIMITADA", "cnpj": "22918180000128", "gestora": "Santander Asset Management", "tipo": "RF", "classe_anbima": "Renda Fixa Duração Baixa Grau de Investimento", "classe_santander": "Reserva de Emergência", "taxa_adm": 0.007, "taxa_perf": "Não há", "cotizacao": "D+0", "liquidacao": "D+0", "aplicacao_minima": 100.0, "publico_alvo": "Geral", "estrategia": "Fundo referenciado DI que busca acompanhar as variações do CDI investindo preponderantemente em cotas de fundos de investimento. A carteira do fundo investido é composta por LFTs (39%), operações compromissadas (27%), letras financeiras (20%), debêntures (11%), FIDC (2%) e CDB (1%), todos de grau de investimento. Foco em ativos de baixa duração com exposição a crédito privado para captura de spread sobre o CDI.", "pros": ["Liquidez imediata: aplicação, resgate e crédito todos em D+0, com cota de abertura", "Aplicação mínima acessível de R$ 100,00, adequado a investidores em geral", "Histórico de rentabilidade próxima ao CDI ao longo de 36 meses (~97% do CDI), com baixíssima volatilidade (0,04% em 12 meses)", "Taxa global máxima reduzida de 0,70% a.a. e ausência de taxa de performance", "Liquidez diária com cotização e crédito D+0, adequado para reserva de curto prazo com retorno levemente superior ao CDI puro", "Carteira diversificada em crédito privado grau de investimento (debêntures, LFs, FIDC), com potencial de spread adicional sobre o CDI"], "contras": ["Fundo sistematicamente abaixo do CDI em vários períodos, chegando a 96,43% do CDI em 2026", "Exposição a crédito privado (debêntures, FIDC, LF) introduz risco de crédito e liquidez, especialmente em momentos de abertura de spreads como observado em março/2025", "Retorno limitado estruturalmente ao CDI, sem potencial de ganho real em cenários de queda de juros", "Menor retorno mensal registrado de -0,21% (mar/20), evidenciando vulnerabilidade pontual em eventos de estresse de mercado", "Rendimento sistematicamente abaixo do CDI (96,95% do CDI em 2026 e 97,12% em 2025), penalizado pela taxa global de 0,70% a.a.", "Exposição a risco de crédito privado (debêntures, FIDC, LFs) que pode gerar volatilidade negativa em cenários de estresse — como observado em março/2020 (-0,21%)", "Come-cotas semestral (maio e novembro) reduz o benefício dos juros compostos ao longo do tempo frente a alternativas isentas", "Taxa global máxima de 0,70% a.a. comprime o retorno líquido em ambiente de queda da Selic"], "isento_ir": null, "tem_come_cotas": null, "speech_comercial": "### 1. Elevator pitch (30 segundos)\n\nOlha, esse é o DI Top da Santander Asset — fundo referenciado CDI com liquidez total em D+0, taxa global de 0,70% a.a. e entrada a partir de R$ 100. Num ambiente em que o Santander está overweight em pós-fixados exatamente porque a Selic em 14,5% entrega retorno real positivo com risco mínimo, esse fundo é a âncora de liquidez da carteira — o lugar onde o dinheiro descansa sem custo de saída e sem risco de marcação negativa, enquanto o resto do portfólio captura prêmio em classes de maior duration.\n\n---\n\n### 2. Versão 2 minutos\n\n**Por que agora**\n\nO debate de junho não é mais \"o Copom vai cortar quanto?\" — é \"vai cortar ou vai pausar?\". O BTG projeta Selic encerrando 2026 em 13,75%, 50 p.b. acima do consenso. Com núcleos de inflação rodando a 6,9% anualizado, fertilizantes acumulando +57% no ano e pressão de câmbio (Santander revisou alvo para R$ 5,40), o ciclo de afrouxamento vai ser mais lento do que o mercado esperava há três meses. Isso tem uma implicação direta pra carteira: a Selic fica alta por mais tempo, e um instrumento que carrega 100% do CDI com saída no mesmo dia passa de \"reserva de emergência\" para componente estratégico no portfólio do cliente que ainda está calibrando onde colocar o risco.\n\n**Estratégia e diferencial**\n\nO DI Top não é um fundo de conta corrente — é um fundo referenciado DI que busca capturar um spread adicional sobre o CDI puro através de crédito privado grau de investimento: LFTs (39%), compromissadas (27%), letras financeiras (20%), debêntures (11%) e FIDC (2%). Toda a carteira é high grade, duração baixa. A lógica é simples: o fundo entrega o CDI com um componente de spread de crédito, dentro de um envelope de risco controlado, sem abrir mão de um segundo de liquidez.\n\n**Desempenho e posicionamento**\n\nO histórico de 36 meses aponta rentabilidade próxima a 97% do CDI com volatilidade de 0,04% em 12 meses — o que coloca o fundo no mesmo nível de risco percebido de uma conta remunerada, com um carrego levemente superior ao CDI puro antes de custos. É justo dizer: a taxa global de 0,70% a.a. comprime o retorno líquido — em 2026 o fundo está rodando a 96,43% do CDI — e, sim, isso é o custo do produto. O argumento não é de alfa: é de liquidez instantânea + crédito high grade + plataforma Santander num único instrumento. Rentabilidade passada não garante resultado futuro.\n\n**Pra quem é**\n\nPúblico geral, qualquer perfil API. Horizonte: curto prazo — reserva de liquidez, caixa tático entre alocações, ou posição de espera enquanto o cliente decide onde alocar o risco de duration. Aplicação mínima de R$ 100.\n\n**Custos e liquidez**\n\nTaxa de administração de 0,70% a.a., sem taxa de performance. Cotização e liquidação em D+0 — aplica hoje, resgata hoje, cai na conta hoje. Não há carência.\n\n---\n\n### 3. Versão 5 minutos — conteúdo aditivo\n\n**Cenário macro completo**\n\nTrês casas convergem em junho num ponto central: pós-fixado é overweight obrigatório neste ambiente. A Selic em 14,5% entrega um dos maiores retornos reais da última década com liquidez diária — e a XP, por exemplo, aloca entre 16% e 72,5% em pós-fixados dependendo do perfil, exatamente por isso. O driver macro que sustenta essa posição é a combinação de inflação resistente (IPCA projetado a 5,1% pelo Santander e 5,3% pelo BTG em 2026, com riscos altistas compartilhados), dívida bruta próxima a 84% do PIB, câmbio pressionado e Fed mantendo Fed Funds em 3,75% sem cortes previstos para 2026. O resultado de maio ilustra o ponto: o perfil Conservador do Santander entregou +70,2% do CDI no mês — os perfis com mais duration sofreram. Quem tinha âncora pós-fixada foi protegido; quem estava excessivamente alocado em curva longa sentiu a marcação. O DI Top existe exatamente pra ser essa âncora.\n\n**Comportamento sob estresse**\n\nFundo de crédito privado de duração baixa tem um risco estrutural específico: em momentos de estresse agudo — como uma abertura expressiva de spreads — a marcação a mercado dos papéis de crédito pode gerar volatilidade negativa pontual, como o próprio histórico do fundo registrou em março/2020 (-0,21% no mês). Isso não é anomalia — é o comportamento esperado de qualquer fundo que carrega crédito privado, ainda que high grade. A boa notícia é que a duração baixa limita a intensidade desses episódios: quanto menor o prazo dos papéis, mais rápido o portfólio se regenera com o carrego. O risco aqui não é de perda estrutural — é de volatilidade pontual em janelas curtas.\n\n**Mecânica tributária**\n\nPor ser fundo de Renda Fixa aberto, o DI Top está sujeito ao come-cotas semestral em maio e novembro — antecipação de IR sobre o rendimento acumulado, à alíquota regressiva (22,5% para aplicações de até 180 dias, reduzindo até 15% acima de 720 dias). O come-cotas reduz o benefício dos juros compostos ao longo do tempo, especialmente em comparação com alternativas isentas como debêntures incentivadas ou LCI/LCA. Para horizonte de curto prazo e uso como caixa tático, o impacto é imaterial. Para reservas de prazo mais longo, vale comparar o retorno líquido com alternativas de mesma liquidez.\n\n**Comparação de classe**\n\nO DI Top compete diretamente com CDBs de liquidez diária, LCIs/LCAs com carência e fundos DI de outras gestoras. O diferencial não está no retorno bruto — está na combinação de liquidez total em D+0 (sem carência, sem janela de resgate), gestão ativa do spread de crédito dentro do envelope high grade, e a comodidade de estar dentro da plataforma Santander com rastreabilidade no extrato. Frente a CDB de banco de segunda linha com liquidez diária, o fundo entrega diversificação de crédito e o risco de concentração em emissor único desaparece. Frente a LCI/LCA, a desvantagem é a tributação — mas a liquidez imediata (LCI/LCA costumam ter carência de 90 a 360 dias) é o diferenciador quando o cliente precisa do dinheiro disponível.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"O fundo está rendendo 96,43% do CDI — é abaixo do CDI. Por que não fico direto no Tesouro Selic?\"**\n\nEntendo, muita gente olha o percentual do CDI e sente que está deixando dinheiro na mesa. O que descobri que faz diferença aqui é comparar o que você está comprando. O Tesouro Selic tem custódia de 0,20% a.a. na B3 e liquidação em D+1 — você aplica hoje, resgata amanhã. O DI Top tem taxa de 0,70% a.a., mas cotização e crédito em D+0: o dinheiro cai na conta no mesmo dia. Para quem usa o produto como caixa operacional ou posição de espera entre alocações, a liquidez instantânea tem valor real que não aparece no percentual do CDI. O custo de não ter liquidez no momento certo pode ser maior do que os 3-4 p.p. de CDI que a taxa consome.\n\n**\"A taxa de 0,70% a.a. é alta para um fundo referenciado DI.\"**\n\nSinto que essa comparação faz sentido à primeira vista. O que muita gente sente é que fundo DI deveria ser commodity barata. O que descobri olhando a carteira: o fundo não é CDI puro — ele carrega crédito privado high grade (debêntures, LFs, FIDC) que gera spread adicional sobre o CDI, e a gestão ativa dessa carteira tem custo. A taxa de 0,70% a.a. é a taxa global máxima — inclui administração, custódia e distribuição. Para um fundo com esse nível de diversificação de crédito e liquidez D+0, o custo está dentro do intervalo esperado para a categoria.\n\n**\"E se o ciclo de corte da Selic for mais rápido e o CDI cair mais do que o projetado?\"**\n\nEntendo a preocupação — e essa é a limitação estrutural do produto, sem rodeios: ele não tem potencial de ganho real em cenário de queda de juros, porque segue o CDI para cima e para baixo. O ponto é que nenhuma das três casas projeta isso para 2026: Santander projeta Selic em 13,25% e o BTG em 13,75%. O consenso é que o CDI vai continuar entregando retorno real positivo pelos próximos 6 a 12 meses. Se o horizonte do cliente for mais longo e ele quiser travar taxa, aí o movimento é migrar parte para IPCA+ ou prefixado — esse fundo não foi feito pra isso. Ele é o lugar onde o dinheiro fica líquido enquanto você toma essa decisão.\n\n**\"Tenho LCI/LCA com retorno similar e não pago IR.\"**\n\nFaz sentido comparar — isenção é um benefício real. O que muda é a liquidez: LCI e LCA têm carência mínima de 90 dias (e costumam oferecer taxas melhores com carências maiores, de 360 a 720 dias). Se o cliente tem certeza que não vai precisar do dinheiro nesse período, a LCI/LCA ganha no retorno líquido. Se o caixa precisa estar disponível a qualquer momento — para uma oportunidade de investimento, uma necessidade, ou uma realocação tática — o D+0 do DI Top não tem equivalente isento com a mesma liquidez. São produtos pra funções diferentes na carteira.\n\n**\"Em março/2020 o fundo ficou negativo. Isso pode acontecer de novo?\"**\n\nPode — e é importante ser transparente sobre isso. Em momentos de estresse agudo de mercado, os papéis de crédito privado que compõem a carteira (debêntures, FIDC, LFs) sofrem marcação negativa quando os spreads abrem de forma rápida. O episódio de março/2020 (-0,21% no mês) é o exemplo do próprio histórico. A proteção aqui vem da duração baixa da carteira: papéis curtos se renovam rápido e o carrego do CDI recupera o território negativo em poucas semanas. Mas o risco existe e precisa estar no radar de qualquer cliente que use o produto.\n\n---\n\n### 5. Ângulo comercial por perfil API\n\n**Conservador:** âncora de liquidez com retorno próximo ao CDI e risco de marcação mínimo dado a duração baixíssima — ideal para a parcela de caixa que não pode ter carência; complementa IPCA+ de médio prazo sem introduzir volatilidade. ✅ Recomendado para a fatia de liquidez da carteira.\n\n**Moderado:** resolve a fatia de caixa tático da carteira sem abrir mão de um dia de liquidez, liberando o restante do portfólio para capturar prêmio em IPCA+ e prefixados com duration adequada ao perfil.\n\n**Balanceado:** alinha com o posicionamento overweight em pós-fixados que as três casas recomendam para junho — função de reserva estratégica enquanto o mercado define o ritmo do ciclo Copom.\n\n**Arrojado:** produtividade do caixa entre operações: enquanto o cliente espera o momento de entrada em IPCA+ longo ou renda variável, o DI Top carrega o CDI integralmente sem custo de oportunidade de liquidez.\n\n**Agressivo:** não é o produto de geração de alfa do portfólio — e não precisa ser. É o colchão que permite manter posições agressivas abertas sem precisar resgatar em momento de volatilidade; liquidez D+0 é o diferencial tático para perfis com alta rotatividade de posições.", "ultima_atualizacao": "2026-06-16"}, {"nome": "DI VIP RESP LIMITADA", "cnpj": "02910278000121", "gestora": "Santander Asset Management", "tipo": "RF", "classe_anbima": "Renda Fixa Duração Baixa Grau de Investimento", "classe_santander": "Reserva de Emergência", "taxa_adm": 0.005, "taxa_perf": "Não há", "cotizacao": "D+0", "liquidacao": "D+0", "aplicacao_minima": 100.0, "publico_alvo": "Geral", "estrategia": "Fundo de cotas que investe em títulos de renda fixa públicos e privados (CDBs, Letras Financeiras, Debêntures, FIDC, LFTs e compromissadas) com objetivo de acompanhar o CDI. A carteira é predominantemente pós-fixada, com alocação relevante em crédito privado grau de investimento. Opera com duração baixa e liquidez D+0.", "pros": ["Liquidez imediata com aplicação, resgate e crédito em D+0, ideal para quem precisa de disponibilidade rápida", "Aplicação mínima acessível de R$ 100,00, aberto a investidores em geral", "Histórico consistente de retorno próximo ou acima do CDI (100,58% do CDI em 2024; 100,46% em 2023)", "PL elevado (~R$ 9,6 bilhões), indicando fundo com grande escala e liquidez de carteira", "Baixíssima volatilidade (0,04% nos últimos 12 meses), refletindo perfil conservador", "Taxa global máxima de apenas 0,50% a.a., muito competitiva para um fundo com crédito privado", "Elevado patrimônio líquido médio (~R$ 9,5 bi em 12 meses), indicando alta liquidez e solidez operacional"], "contras": ["Rentabilidade levemente abaixo do CDI em 2025 (98,82%) e início de 2026 (98,38%), evidenciando leve drag de custos e crédito", "Exposição a risco de crédito privado (debêntures 11%, FIDC 2%), com possibilidade de volatilidade em cenários de estresse de crédito", "Taxa global máxima de 0,50% a.a. pode reduzir competitividade frente a alternativas diretas em Tesouro Selic", "Sem garantia do FGC e sem proteção do administrador ou gestor, expondo cotistas a riscos de crédito dos emissores privados", "Exposição a crédito privado (CDBs, Debêntures, LFs, FIDCs) sujeita a abertura de spreads e aumento de aversão a risco, como observado em 2025", "Mercado de LFTs com baixa liquidez nos vencimentos intermediários pode impactar a gestão da carteira", "Come-cotas semestral (maio e novembro) reduz o efeito dos juros compostos ao longo do tempo", "Não conta com garantia do FGC, expondo o investidor ao risco dos emissores privados na carteira"], "isento_ir": null, "tem_come_cotas": null, "speech_comercial": "### 1. Elevator pitch (30 segundos)\n\nOlha, o DI VIP é o fundo pós-fixado da própria Santander Asset — R$ 9,6 bilhões de patrimônio, liquidez D+0 e taxa de 0,50% a.a., uma das mais competitivas do mercado para um fundo com crédito privado grau de investimento na carteira. Com a Selic em 14,5% e as três maiores casas de research do país em overweight em pós-fixado este mês — Santander, BTG e XP em consenso raro —, ter uma âncora de liquidez remunerada a esse carrego não é postura conservadora: é inteligência de alocação. Deixar esse recurso em conta corrente ou num produto de menor eficiência é abrir mão de retorno real positivo sem nenhuma contrapartida.\n\n---\n\n### 2. Versão 2 minutos (reunião curta)\n\n**Por que AGORA**\n\nO Copom está em ciclo de afrouxamento, mas o mercado entrou em junho com debate real sobre pausa: o BTG projeta Selic encerrando 2026 em 13,75% — 50 p.b. acima do consenso — e os núcleos de inflação ainda rodam em patamar preocupante. O resultado prático: a Selic vai cair, mas devagar, e o CDI de 14,5% a.a. segue entregando retorno real positivo relevante pelos próximos seis meses no mínimo. Pós-fixado com liquidez é, neste momento, overweight explícito nas três casas consultadas — Santander, BTG e XP, consenso raro em qualquer ambiente. O custo de não estar posicionado aqui é concreto: cada mês fora desse carrego é retorno real que não volta.\n\n**Estratégia e diferencial**\n\nO DI VIP é um fundo de renda fixa duração baixa da Santander Asset — foco em acompanhar o CDI com carteira predominantemente pós-fixada: LFTs (36%), compromissadas (30%), Letras Financeiras (19%) e Debêntures (11%), todos grau de investimento. A inclusão de crédito privado high grade é o que viabiliza entregar acima do CDI sem abrir mão de liquidez — o fundo gera prêmio incremental pela seleção de ativos sem elevar duration ou risco de taxa.\n\n**Desempenho e posicionamento**\n\nO histórico documenta 100,58% do CDI em 2024 e 100,46% em 2023 — desempenho acima do CDI líquido de custos, o que é o objetivo do produto. Em 2025 e início de 2026, o fundo registrou leve drag (98,82% e 98,38% do CDI, respectivamente), reflexo da abertura de spreads de crédito que afetou a classe como um todo nesse período — e não um problema estrutural da estratégia. Rentabilidade passada não garante resultado futuro. PL de R$ 9,6 bilhões e volatilidade de 0,04% nos últimos 12 meses completam o quadro de solidez operacional.\n\n**Pra quem é**\n\nPerfil conservador a moderado, com recursos que exigem disponibilidade — reserva de liquidez, capital entre alocações, ou parte da carteira que não pode ter volatilidade. Ticket mínimo de R$ 100. Aplicação e resgate em D+0.\n\n**Custos e liquidez**\n\nTaxa de administração de 0,50% a.a. — sem taxa de performance. Cotização e liquidação em D+0, sem carência. A taxa é muito competitiva para um fundo gerido ativamente com crédito privado; a comparação mais honesta não é contra o Tesouro Selic direto, mas contra a entrega líquida que o produto historicamente produziu acima do CDI bruto.\n\n---\n\n### 3. Versão 5 minutos (conteúdo aditivo)\n\n**Cenário macro completo**\n\nMaio/2026 entregou uma combinação desconfortável: abertura expressiva da curva longa (NTN-Bs acima de 7,3% de yield real), Ibovespa com queda de 6,5% a 7,2% no mês, e IPCA-15 surpreendendo negativamente em núcleos — com o componente Livres rodando em 6,92% anualizado (MM3M, BTG), bem acima da meta de 3%. O exterior não ajuda: Treasury 30 anos na máxima em quase duas décadas, petróleo acima de US$ 100/barril e Fed mantendo juro em 3,75% sem previsão de corte. O Santander revisou câmbio-alvo para R$ 5,40 ao fim de 2026 e projeta IPCA de 5,1% com riscos altistas explícitos. A implicação direta pra este fundo: o CDI permanece elevado por mais tempo do que o mercado precificava há três meses — o que estende a janela de carrego relevante e reforça o posicionamento defensivo pós-fixado como âncora de carteira.\n\n**Comportamento sob estresse**\n\nFundos de renda fixa com crédito privado marcam posições a mercado — em momentos de abertura de spreads (como 2025 demonstrou), o resultado pode ficar abaixo do CDI, como os dados do fundo registram. Isso não é evento isolado do DI VIP: é o comportamento estrutural da classe. A forma correta de ler esse risco é no contexto da carteira: volatilidade de 0,04% nos últimos 12 meses evidencia que, mesmo com crédito privado, a duration baixa e a seleção high grade contêm bem a oscilação. O risco aqui não é de perda de capital em cenário normal — é de drag temporário de performance relativa ao CDI em momentos de estresse de crédito severo.\n\n**Mecânica tributária**\n\nFundo de renda fixa aberto — sujeito a come-cotas semestral (antecipação de IR em maio e novembro), com alíquota regressiva de 22,5% (até 180 dias) a 15% (acima de 720 dias). Não há isenção de IR. Para recursos de longo prazo, a regressividade favorece o investidor; o come-cotas reduz o efeito dos juros compostos no tempo — limitação estrutural da classe, não exclusiva deste fundo. Esse ponto reforça que o produto faz mais sentido como liquidez ou posição de curto/médio prazo do que como veículo de acumulação de décadas.\n\n**Comparação de classe**\n\nDentro da classe pós-fixada, a alternativa mais próxima é o Tesouro Selic direto — sem come-cotas e com garantia do Tesouro Nacional, mas sem crédito privado incremental. O DI VIP compete pelo prêmio de carrego sobre o CDI puro e pela gestão ativa da Santander Asset, com PL que viabiliza acesso a emissores e estruturas indisponíveis ao investidor direto. LCI/LCA de bancários menores podem oferecer isenção de IR, mas com liquidez inferior e risco de crédito concentrado num único emissor. A comparação correta é retorno líquido ajustado por liquidez — e o D+0 tem valor real para carteiras que precisam de mobilidade.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"A taxa de 0,50% a.a. come o retorno — prefiro o Tesouro Selic direto.\"**\nEntendo essa lógica — e faz sentido levantar. O que o histórico mostra é que, mesmo após a taxa, o fundo entregou 100,58% do CDI em 2024 e 100,46% em 2023 — ou seja, o crédito privado incrementa retorno suficiente para cobrir o custo e ainda superar o CDI bruto. A comparação não é taxa vs. zero: é retorno líquido entregue vs. alternativa. Dito isso, em 2025 e 2026 o drag de spreads ficou levemente abaixo do CDI — e isso é honesto de reconhecer. O ponto é que para quem precisa de D+0 com gestão ativa high grade, a taxa é justificada pelo produto entregue.\n\n**\"Em 2025 e 2026 ficou abaixo do CDI — o fundo piorou?\"**\nMuita gente sentiu essa dúvida quando viu o dado. O que aconteceu foi que a abertura de spreads de crédito em 2025 impactou toda a classe de renda fixa com crédito privado — não foi um problema específico de gestão. O histórico de 2023 e 2024 mostra que a estratégia entrega acima do CDI quando os spreads estão estáveis. O cenário atual de crédito high grade com spreads se acomodando (leitura Santander e BTG para junho) é justamente o ambiente em que o prêmio incremental volta a aparecer.\n\n**\"Já tenho CDB de banco grande com retorno similar.\"**\nA diferença estrutural é liquidez e diversificação. CDB de banco único concentra risco num emissor — sem FGC acima de R$ 250 mil por CPF por instituição. O DI VIP dilui o risco em dezenas de emissores high grade, com D+0 real e PL de R$ 9,6 bilhões garantindo que o resgate não depende de um mercado secundário. Para valores relevantes de Private, a diversificação de risco de crédito tem valor que o spread de um CDB não remunera integralmente.\n\n**\"E se a Selic não cair como projetado — ou pior, subir?\"**\nEsse é o melhor cenário pra este produto, não o pior. Se o BTG estiver certo e a Selic pausar em 13,75%, o CDI permanece atrativo por mais tempo — o carrego do fundo aumenta, não diminui. Um pós-fixado de duration baixa é o ativo que se beneficia diretamente de Selic mais alta por mais tempo. O risco de alta de juro prejudica prefixados e IPCA+ de duration longa — não este fundo.\n\n**\"Não tem FGC — estou exposto ao risco dos emissores privados.\"**\nCorreto, e é importante nomear. Fundos de investimento não têm FGC — o investidor está exposto ao risco dos emissores na carteira. O que mitiga aqui são três camadas: (1) todos os ativos são grau de investimento high grade; (2) a diversificação entre dezenas de emissores elimina concentração em nome único; (3) o PL de R$ 9,6 bilhões permite liquidez de carteira que um portfólio menor não teria. Não é garantia — é gestão de risco. Para quem quer garantia de FGC, o produto é um CDB dentro do limite garantido, e essa é uma conversa que fazemos separada.\n\n**\"Come-cotas semestral é ruim — prefiro algo sem.\"**\nFaz sentido para horizonte de acumulação longa. O come-cotas é um drag real de composição — antecipa IR em maio e novembro, reduzindo o capital que compõe. Para esse objetivo específico, LCA/LCI isentos ou debêntures incentivadas são alternativas mais eficientes no longo prazo. O DI VIP faz mais sentido como liquidez operacional ou posição de curto/médio prazo — não como veículo de previdência de 20 anos. Se esse for o objetivo, temos produtos mais adequados pra essa janela.\n\n---\n\n### 5. Ângulo comercial por perfil API\n\n- **Conservador:** É o produto-âncora para liquidez — D+0, volatilidade de 0,04%, gestão Santander Asset e carrego de CDI no patamar mais alto da última década. A pergunta não é \"por que ter?\" — é \"quanto da reserva de liquidez ainda não está aqui rendendo 14,5%?\"\n\n- **Moderado:** Complementa a posição em IPCA+ e prefixados como o colchão de liquidez que permite aproveitar oportunidades táticas sem precisar resgatar ativos com duration. Mantém a carteira respirando sem sacrificar o carrego.\n\n- **Balanceado:** Alinha com o overweight em pós-fixados da carteira-modelo Santander de junho — é a base defensiva que sustentou os perfis Conservador e Moderado em maio (+70,2% CDI) enquanto as posições de risco sofreram. Peso ideal como reserva de mobilidade tática.\n\n- **Arrojado:** Funciona como caixa de alta eficiência — o capital em espera para oportunidades (IPCA+, crédito estruturado, RV global) não pode ficar parado em conta; aqui ele rende CDI com liquidez imediata sem custo de oportunidade.\n\n- **Agressivo:** Diversificação de base: carteiras concentradas em RV e alternativos precisam de um colchão líquido que não correle com os betas de risco. O DI VIP entrega esse papel sem drag de rentabilidade relevante.", "ultima_atualizacao": "2026-06-16"}, {"nome": "RENDA FIXA CRÉDITO P const CLASSES = ["Alternativos", "Inflação", "Multimercados", "Prefixados", "Pós-fixados", "Renda Variável", "Renda Variável Global", "Reserva de Emergência"];
let filtroClasse = null;
let termoBusca = "";

function fmtPct(v) {
  if (v === null || v === undefined) return "—";
  return (v * 100).toFixed(2).replace(".", ",") + "%";
}
function fmtBRL(v) {
  if (v === null || v === undefined) return "—";
  return "R$ " + v.toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
// Markdown leve pro speech (títulos ###, negrito **, listas)
function mdLeve(txt) {
  if (!txt) return "";
  let h = esc(txt);
  h = h.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  h = h.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  h = h.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  return h;
}

function renderFiltros() {
  const cont = document.getElementById("filtros");
  let html = `<div class="chip ${filtroClasse===null?'ativo':''}" onclick="setFiltro(null)">Todos</div>`;
  for (const c of CLASSES) {
    html += `<div class="chip ${filtroClasse===c?'ativo':''}" onclick="setFiltro('${esc(c)}')">${esc(c)}</div>`;
  }
  cont.innerHTML = html;
}
function setFiltro(c) { filtroClasse = c; render(); }

function fundoVisivel(f) {
  if (filtroClasse && f.classe_santander !== filtroClasse) return false;
  if (termoBusca) {
    const alvo = (f.nome + " " + f.gestora + " " + f.estrategia + " " + f.classe_santander).toLowerCase();
    if (!alvo.includes(termoBusca)) return false;
  }
  return true;
}

function cardHTML(f, idx) {

  if (f.aplicacao_minima) body += `<div class="linha"><span class="k">Aplic. mínima</span><span class="v">${fmtBRL(f.aplicacao_minima)}</span></div>`;
  if (f.publico_alvo) body += `<div class="linha"><span class="k">Público</span><span class="v">${esc(f.publico_alvo)}</span></div>`;
  if (f.cnpj) body += `<div class="linha"><span class="k">CNPJ</span><span class="v">${esc(f.cnpj)}</span></div>`;
  if (fiscal) body += `<div style="margin-top:8px">${fiscal}</div>`;

  if (f.estrategia) body += `<div class="secao-titulo">Estratégia</div><div style="font-size:13.5px">${esc(f.estrategia)}</div>`;
  if (f.pros && f.pros.length) {
    body += `<div class="secao-titulo">Prós</div><ul class="pros pros-contras">`;
    for (const p of f.pros) body += `<li>${esc(p)}</li>`;

  }
  if (f.contras && f.contras.length) {

    body += `</ul>`;
  }
  if (f.speech_comercial) {
    body += `<div class="secao-titulo">🎤 Speech comercial</div><div class="speech">${mdLeve(f.speech_comercial)}</div>`;
  }

  return `<div class="card" id="card${idx}">
    <div class="card-head" onclick="toggle(${idx})">
      <div>
        <div class="card-nome">${esc(f.nome)}</div>
        <div class="card-meta">${esc(f.gestora)||"—"} · taxa ${fmtPct(f.taxa_adm)}${f.speech_comercial?" · 🎤 speech":""}</div>
        <span class="badge">${esc(f.classe_santander)}</span>
      </div>
      <span class="seta">▶</span>
    </div>
    <div class="card-body">${body}</div>
  </div>`;
}

function toggle(idx) {
  document.getElementById("card"+idx).classList.toggle("aberto");
}

function render() {
  const lista = document.getElementById("lista");
  const visiveis = FUNDOS.filter(fundoVisivel);
  document.getElementById("contador").textContent =

  if (!visiveis.length) {
    lista.innerHTML = `<div class="vazio">Nenhum fundo encontrado.<br>Tente outra busca ou filtro.</div>`;
    return;
  }
  lista.innerHTML = visiveis.map((f, i) => cardHTML(f, FUNDOS.indexOf(f))).join("");
}

document.getElementById("busca").addEventListener("input", e => {
  termoBusca = e.target.value.trim().toLowerCase();
  render();
});

renderFiltros();
render();
