arrego em pós-fixado não é posição defensiva por falta de opção — é a âncora racional de qualquer carteira.\n\n**Estratégia e diferencial**\n\nO DI Top é um fundo referenciado DI — o objetivo é acompanhar o CDI com carteira de crédito privado grau de investimento (LFTs 39%, compromissadas 27%, letras financeiras 20%, debêntures 11%, FIDC 2%, CDB 1%). O diferencial frente a um produto puramente de Selic está nessa camada de crédito high grade, que captura spread adicional sobre o CDI, ainda que modesto. A gestão é da própria Santander Asset, o que significa acesso ao mesmo crédito que a mesa institucional seleciona com rigor de grau de investimento.\n\n**Retorno vs benchmark**\n\nO fundo entrega consistentemente próximo a 97%–98% do CDI ao longo de 36 meses, com volatilidade anualizada de 0,04% nos últimos 12 meses — praticamente linha reta. O retorno fica sistematicamente abaixo do CDI bruto por conta da taxa global de 0,70% a.a., que é o custo explícito dessa liquidez e gestão. Sem taxa de performance.\n\n**Pra quem é**\n\nPerfil API: geral — serve de Moderado a Arrojado como reserva de carrego e liquidez. Não se aplica como única posição de renda fixa em Conservador que precise de proteção inflacionária. Horizonte mínimo: pode ser D+0, mas o fundo ganha sentido como posição estrutural de curto prazo (até 12–18 meses), enquanto o ciclo de cortes ainda não justifica migração total para duration.\n\n**Custos e liquidez**\n\nTaxa de administração global máxima: **0,70% a.a.** — sem taxa de performance. Cotização e liquidação **D+0** com cota de abertura. Aplicação mínima: **R$ 100,00**.\n\n---\n\n### 3. Versão 5 minutos (conteúdo adicional)\n\n**Cenário macro completo e implicação direta para esse fundo**\n\nO choque do petróleo — Brent acima de US$ 100/barril, alta de 80,5% em 12 meses segundo a Santander Asset — é o fator que ressuscitou o \"juros mais altos por mais tempo\" neste ciclo. A projeção de IPCA converge entre as casas em 4,8%–4,9% para 2026, revisada para cima frente ao 4,3% realizado em 2025. O Copom comunicou cautela explícita sobre a extensão do ciclo de cortes — e a curva DI precifica Selic encerrando 2026 em ~14%, enquanto a própria Santander Asset projeta 13,25% e o BTG projeta 13,00%. A divergência entre mercado e casas buy-side implica que o carrego do DI Top deve permanecer entre 13,25% e 14% bruto ao longo dos próximos 6–12 meses — nenhuma queda abrupta no horizonte próximo. Para esse fundo, isso é diretamente positivo: quanto maior e mais persistente a Selic, mais o CDI rende e mais o fundo entrega em termos absolutos.\n\n**Comportamento sob estresse**\n\nO ponto honesto: em março de 2020, o fundo marcou **-0,21%** no mês — o único mês negativo relevante no histórico — por conta da abertura de spreads de crédito privado durante o choque da pandemia. A camada de debêntures, FIDC e letras financeiras que captura o spread adicional é exatamente o vetor de risco em momentos de estresse sistêmico. Em abril de 2025, os spreads também abriram (IDEX-INFRA chegou a 58 bps vs. média de 42 bps, segundo a XP), mas sem impacto de magnitude semelhante ao de 2020, dada a qualidade do crédito investido. A recuperação histórica depois do estresse de 2020 foi rápida — o fundo não tem ativos ilíquidos de second lien; a carteira é integralmente high grade. O risco não é zero, mas está bem calibrado para a proposta do produto.\n\n**Mecânica tributária**\n\nO DI Top tem **come-cotas semestral** — o fundo recolhe antecipadamente IR em maio e novembro, retirando aproximadamente 15% do rendimento acumulado a cada semestre. Na prática, isso cria um \"drag\" de juros compostos ao longo do tempo frente a alternativas isentas (LCI, LCA, CRI, CRA) ou a fundos de previdência que diferem o imposto. A tabela regressiva se aplica normalmente: de 22,5% até 180 dias até 15% acima de 720 dias. Para um cliente que já detém LCI ou LCA no portfólio, o ponto de indiferença tributária entre o DI Top e uma LCI isenta equivalente a 100% do CDI está em torno de 85% do CDI na LCI — o fundo entrega ~97%–98% do CDI bruto menos o come-cotas, o que ainda é vantajoso frente à LCI/LCA típica de mercado que costuma ser emitida entre 88%–93% do CDI para o perfil Private.\n\n**Comparação com alternativas de classe**\n\nFrente a um fundo de Selic puro (sem crédito privado), o DI Top captura um spread de alguns bps adicionais pela camada de crédito high grade — mas a diferença não é dramática. O diferencial real está na **liquidez D+0 com cota de abertura** combinada à estrutura de crédito diversificada — algo que fundos com liquidez D+1 ou D+2 às vezes cobram a mais. Frente a um CDB de liquidez diária, o DI Top perde no diferimento do come-cotas, mas ganha em diversificação de emissor e em gestão ativa de crédito pela equipe da Santander Asset.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"0,70% de taxa de administração é alto pra um fundo DI.\"**\nPara fundos DI com liquidez D+0 e gestão de crédito privado high grade, 0,70% a.a. está na faixa de mercado — fundos referenciados DI com crédito privado de qualidade comparável cobram entre 0,50% e 1,00% a.a. O retorno líquido consistente em ~97%–98% do CDI ao longo de 36 meses já é o número depois dessa taxa: não é promessa, é histórico. A pergunta certa não é \"a taxa é alta?\" — é \"o retorno líquido entregado justifica o custo?\" E aqui, entrega.\n\n**\"O fundo fica sistematicamente abaixo do CDI — por que não comprar o CDI direto?\"**\nCDI \"direto\" não existe para pessoa física — a alternativa real é CDB de liquidez diária, que geralmente remunera entre 95% e 100% do CDI dependendo do banco e do montante. O DI Top, mesmo com a taxa, entrega ~97%–98% do CDI bruto com diversificação de crédito, gestão ativa e liquidez D+0. E o come-cotas é um timing de imposto, não uma perda de principal — o retorno bruto antes do IR é competitivo.\n\n**\"Já tenho Tesouro Selic — qual a diferença?\"**\nO Tesouro Selic tem liquidez D+1 no Tesouro Direto (com eventual marcação a mercado em eventos de estresse) e é puramente indexado à Selic. O DI Top tem liquidez D+0 com cota de abertura e a camada de crédito privado high grade que captura spread adicional. Para quem usa o Tesouro Selic como reserva de caixa transacional, o DI Top pode cumprir o mesmo papel com liquidez levemente superior no dia a dia.\n\n**\"Esse crédito privado não me preocupa? Março de 2020 foi -0,21%.\"**\nÉ o único mês negativo relevante em mais de 36 meses de histórico — e foi no pior evento de crédito global desde 2008. A carteira é integralmente grau de investimento, sem exposição a emissores de segunda linha. Em abril de 2025, quando os spreads voltaram a abrir (XP reportou IDEX-INFRA em 58 bps vs. média histórica de 42 bps), o fundo não registrou volatilidade negativa relevante. O risco existe e é honesto reconhecer — mas é o risco mais bem remunerado por unidade de volatilidade dentro da classe pós-fixada.\n\n**\"Come-cotas semestral é uma desvantagem vs. LCI.\"**\nVerdade — o come-cotas retira o benefício dos juros compostos. O ponto de indiferença: uma LCI a 88%–90% do CDI isenta equivale ao DI Top em retorno líquido de longo prazo. Se você tem acesso a LCI acima de 92%–93% do CDI no Private, a LCI ganha no longo prazo. Se a LCI disponível está abaixo disso ou com prazo de carência que você não pode travar, o DI Top é a melhor alternativa com liquidez total.\n\n**\"E se a Selic cair mais rápido do que o projetado — o fundo perde relevância?\"**\nParcialmente certo. Se a Selic cair para 12,50% até dezembro (projeção mais dovish do Santander), o retorno bruto do DI Top cai proporcionalmente. Mas nesse cenário, o que valoriza são os prefixados e o IPCA+ longo — e esse fundo não disputa esse papel. Ele é a parcela de liquidez e carrego, não a parcela de captura de prêmio. A migração gradual de parte do pós-fixado para duration mais longa é o movimento complementar certo — e não elimina o DI Top, reduz o peso dele.\n\n---\n\n### 5. Ângulo comercial por perfil API\n\n**Conservador:** âncora de carrego e liquidez num perfil que não pode tolerar volatilidade — com Selic em 14,50% e retorno real acima de 9% a.a., esse fundo entrega o máximo que o perfil pode extrair sem risco de mercado. O peso ideal é de 40%–60% da alocação em renda fixa pós-fixada, complementado por IPCA+ curto para proteção inflacionária.\n\n**Moderado:** peça de liquidez operacional dentro da carteira — mantém o carrego enquanto a parcela de duration (prefixados médios e IPCA+) trabalha a captura de prêmio. Peso sugerido: 20%–30% da carteira total.\n\n**Balanceado:** alinhado ao overweight em pós-fixados da Carta Mensal Santander de Maio/2026 — funciona como reserva tática de liquidez para rebalanceamentos oportunísticos, especialmente num ano com volatilidade eleitoral crescente no 2S26. Peso: 15%–25%.\n\n**Arrojado:** liquidez estratégica para aproveitar janelas de entrada em ativos de risco — o DI Top não é o motor do retorno nesse perfil, mas é o \"munição de caixa\" que permite agir quando a bolsa ou o crédito abre uma oportunidade. Peso: 10%–15% como reserva transacional.\n\n**Agressivo:** ❌ Não recomendado como posição relevante para esse perfil. A oportunidade de geração de alpha neste cenário está nos prefixados longos, IPCA+ de duration ~7 anos e RV — o DI Top dilui o retorno esperado da carteira sem adicionar descorrelação significativa. No máximo, 5%–10% como caixa operacional.", "ultima_atualizacao": "2026-06-15"}, {"nome": "DI VIP RESP LIMITADA", "cnpj": "02910278000121", "gestora": "Santander Asset Management", "tipo": "RF", "classe_anbima": "Renda Fixa Duração Baixa Grau de Investimento", "classe_santander": "Reserva de Emergência", "taxa_adm": 0.005, "taxa_perf": "Não há", "cotizacao": "D+0", "liquidacao": "D+0", "aplicacao_minima": 100.0, "publico_alvo": "Geral", "estrategia": "Fundo de cotas que investe em títulos de renda fixa públicos e privados (CDBs, Letras Financeiras, Debêntures, FIDC, LFTs e compromissadas) com objetivo de acompanhar r de negociação com emissores — o fundo não precisa vender ativo a desconto para honrar resgates.\n\n**Retorno vs. benchmark**\n\n| Período | DI VIP | % do CDI |\n|---|---|---|\n| 2023 | — | 100,46% |\n| 2024 | — | 100,58% |\n| 2025 | — | 98,82% |\n| 2026 (parcial) | — | 98,38% |\n\nEm 2025 e 2026 o fundo ficou levemente abaixo do CDI — o crédito privado abriu spreads num ambiente de maior aversão a risco, o que comprimiu marginalmente o retorno. Mas o desvio de ~1,6 pp acumulado é o custo de ter um colchão gerido ativamente, não um produto passivo de Tesouro Selic.\n\n**Pra quem é**\n\nTodos os perfis API como posição de liquidez — não como aposta de retorno. Horizonte: sem restrição, resgate a qualquer momento. Ticket mínimo: R$ 100.\n\n**Custos e liquidez**\n\nTaxa de administração (global máxima): **0,50% a.a.** Sem taxa de performance. Cotização e liquidação: **D+0** — aplica hoje, resgata hoje, cai na conta hoje.\n\n---\n\n### 3. Versão 5 minutos (conteúdo adicional)\n\n**Cenário macro completo — implicações diretas para este fundo**\n\nO comunicado do Copom que acompanhou o corte de 25 bps para 14,50% adotou tom marcadamente cauteloso: alertas explícitos à deterioração das medidas subjacentes de inflação e à extensão do ciclo. Isso é relevante para o DI VIP de duas formas opostas e simultâneas. Por um lado, **favorece o carrego**: quanto mais tempo a Selic ficar elevada, mais o CDI rende no período — e a Santander Asset projeta Selic em 13,25% ao fim de 2026, ainda bem acima da média histórica. Por outro, **limita o upside relativo**: se a Selic ceder mais rápido do que o projetado (Santander Recomendações é a mais dovish com 12,50%), o custo de oportunidade de não ter alocado em prefixados médios ou IPCA+ longo fica evidente. A mensagem honesta: o DI VIP é a âncora de liquidez, não o motor de retorno da carteira — faz o papel dele enquanto a outra parte do portfólio captura os prêmios de duration.\n\n**Comportamento sob estresse**\n\nO pior cenário para esse fundo é um evento de crédito sistêmico em emissores privados grau de investimento — os 11% em debêntures e 2% em FIDCs ficam sujeitos a abertura brusca de spreads, como aconteceu marginalmente em 2025 (retorno caiu para 98,82% do CDI). O fundo não tem garantia do FGC — o risco dos emissores é dos cotistas. Historicamente, a volatilidade do fundo ficou em **0,04% nos últimos 12 meses** — praticamente inexistente em condições normais. Em cenário de stress sistêmico (ex.: crise de crédito 2008-style), o impacto seria temporário e concentrado na parcela privada (~13% da carteira); os ~66% em LFTs e compromissadas funcionam como amortecedor. Não há histórico de drawdown significativo neste fundo dado o perfil de duração baixa e concentração em pós-fixado soberano.\n\n**Mecânica tributária**\n\n⚠️ Este fundo tem **come-cotas semestral** — em maio e novembro, a Receita Federal antecipa o IR na alíquota de 15% sobre o rendimento acumulado do período. O efeito prático: o fundo paga imposto antes do resgate, reduzindo o capital que continua rendendo juros compostos. Para horizontes longos, esse \"drag\" semestral reduz o retorno final vs. um produto isento de come-cotas (como LCI/LCA ou CRI/CRA). A tabela regressiva de IR se aplica normalmente: alíquota de 22,5% para resgates em até 180 dias, caindo para 15% acima de 720 dias. Fundo aberto de renda fixa — não isento de IR para pessoa física.\n\n**Comparação com alternativas de classe**\n\nVersus um ETF de Tesouro Selic passivo (tipo IMA-S): o DI VIP entrega marginalmente acima do CDI em anos normais pela parcela de crédito privado, mas paga 0,50% a.a. de taxa global — um produto passivo de LFT cobra entre 0,05% e 0,20% a.a. A diferença é que o DI VIP é gerido ativamente pela Santander Asset com escala de R$ 9,5 bi (poder de negociação) e está disponível na plataforma com D+0 integrado ao ecossistema Santander. Versus LCI/LCA de banco de primeira linha: a LCI/LCA é isenta de IR e sem come-cotas, o que no retorno líquido equivale a ~CDI × 117% numa alíquota de 15%. Para o investidor que tem liquidez travada aceitável (90–360 dias), a LCI/LCA high grade vence o DI VIP no retorno líquido. O DI VIP ganha na liquidez irrestrita D+0 — é para o dinheiro que pode precisar amanhã.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"A taxa de 0,50% a.a. é alta — o Tesouro Selic direto não cobra quase nada.\"**\nVerdade parcial. O Tesouro Selic via Tesouro Direto cobra 0,20% a.a. de custódia B3 + possível taxa da corretora, e não tem come-cotas. O DI VIP cobra 0,50% mas tem D+0 real — o Tesouro Direto tem prazo de liquidação de D+1 no resgate e crédito ainda mais longo dependendo da plataforma. Para o dinheiro que você precisa disponível amanhã sem fricção, os 30 bps de diferença são o custo da liquidez operacional dentro do ecossistema Santander.\n\n**\"Em 2025 e 2026 o fundo ficou abaixo do CDI — isso é sinal de piora?\"**\nNão é piora estrutural — é o comportamento esperado quando spreads de crédito privado se abrem em ambiente de maior aversão a risco. A parcela de debêntures e FIDCs (~13% da carteira) sofre marginalmente nesse cenário. O desvio ficou em ~1,6 pp acumulado em dois anos, o que é coerente com o perfil conservador do fundo. Quando o crédito se normaliza, o fundo tende a voltar a superar o CDI — como fez em 2023 e 2024.\n\n**\"Não tem FGC — por que não usar um CDB que cobre até R$ 250 mil?\"**\nPara tickets acima de R$ 250 mil por emissor, o FGC já não protege integralmente de qualquer forma. O DI VIP dilui o risco em dezenas de emissores grau de investimento com PL de R$ 9,5 bi — a diversificação estrutural do fundo é o substituto funcional do FGC para carteiras de porte. Para tickets menores, a LCI/LCA ou CDB com FGC é de fato mais eficiente — o DI VIP é a solução de escala.\n\n**\"Tenho come-cotas no fundo — melhor usar LCI/LCA direto.\"**\nPara dinheiro com janela de 90 a 360 dias travados, concordo — LCI/LCA high grade isenta ganha no retorno líquido. O DI VIP é complementa c em 14,50%, IPCA projetado em 4,8% e o comunicado do Copom sinalizando ciclo mais lento, o CDI entrega retorno real de aproximadamente 10% a.a. sem risco de duration. Isso é o que o fundo captura — crédito privado high grade que extrai um spread adicional sobre o CDI puro enquanto o cenário não se define. XP, BTG e Santander convergem nesse ponto; o único dissenso é o BTG, que prefere migrar para duration longa — argumento que faz sentido para uma parcela do portfólio, não para substituir o carrego.\n\n**Estratégia e diferencial**\n\nÉ um fundo de fundos que concentra ~90% no SANT FIRF EQUILI ADV e ~11% no SANT REF DI PREM FIC, ambos de crédito privado grau de investimento (CDBs, Letras Financeiras, Debêntures) com duration livre — ou seja, o gestor pode ajustar o prazo médio da carteira conforme o ciclo de juros, sem ficar travado num vencimento fixo. O resultado é uma máquina de carrego CDI+ gerida dentro de casa, com PL de R$ 2,255 bilhões que dá estabilidade estrutural e poder de negociação em emissões primárias.\n\n**Retorno vs benchmark**\n\n| Janela | Fundo | CDI |\n|---|---|---|\n| 2024 | 105,38% do CDI | 100% |\n| 2025 (acum.) | 102,38% do CDI | 100% |\n| 36 meses | 46,69% | 43,75% |\n| Vol. 12m | 0,09% | — |\n\nO mês de março/2026 foi fraco (90,42% do CDI) e o acumulado de 2026 até o último dado está em 97,99% do CDI — ponto de atenção que endereço nas objeções.\n\n**Pra quem é**\n\nPúblico geral, perfil API a partir de Conservador. Horizonte recomendado: médio prazo (12+ meses para suavizar eventuais volatilidades de spread). Ticket mínimo de R$ 100,00 — na prática, para cliente Private, a conversa é sobre peso na carteira, não ticket.\n\n**Custos e liquidez**\n\nTaxa de administração de **0,40% a.a.** (taxa global máxima, sem taxa de performance). Cotização D+0 tanto na aplicação quanto no resgate; liquidação financeira em **D+1** após cotização. Pra renda fixa com crédito privado gerido ativamente, 0,40% é comprimido.\n\n---\n\n### 3. Versão 5 minutos (APENAS conteúdo adicional)\n\n**Cenário macro completo — o que isso significa especificamente para este fundo**\n\nO choque do petróleo (Brent acima de US$ 100/barril, +80,5% em 12 meses) ressuscitou a narrativa de \"juros mais altos por mais tempo\" e obrigou todas as casas a elevar projeções de IPCA para 4,8%-4,9% — bem acima da meta de 3,0%. Para um fundo CDI+, esse ambiente é, paradoxalmente, favorável: a Selic mais alta por mais tempo significa que o CDI base sobre o qual o fundo opera permanece em patamar elevado por mais tempo. O risco específico para este fundo não vem da Selic em si, mas dos spreads de crédito privado: a síntese do mês documenta fluxo negativo para a classe e menor dinamismo em novas emissões (confirmado pelo próprio gestor na lâmina). Santander Asset adota postura **Neutro/Cauteloso** em crédito privado — não overweight — exatamente pelo risco de abertura de spreads que comprimiria temporariamente o retorno relativo ao CDI, como ocorreu em março/2026.\n\n**Comportamento sob estresse**\n\nO pior mês histórico registrado foi **-1,50% em março/2020** — o evento de liquidez extrema do início da pandemia, quando fundos de crédito privado em todo o mercado sofreram resgates em massa e os spreads abriram abruptamente. A recuperação foi rápida (o fundo voltou a superar o CDI já nos meses seguintes de 2020 e manteve histórico consistente acima em 2021-2024), mas o número honesto é esse: em crises agudas de liquidez de crédito, o fundo pode registrar retorno negativo pontual. O mitigante concreto é o PL de R$ 2,255 bilhões — fundos com PL elevado e base diversificada de cotistas têm menor risco de gate (liquidação forçada de ativos para honrar resgates). Não é blindagem total, mas é diferente de um fundo de R$ 50 milhões.\n\n**Mecânica tributária**\n\nFundo aberto de renda fixa — sujeito a **come-cotas semestral** (antecipação de IR de 15% do rendimento, cobrada em maio e novembro). Na prática, isso reduz o efeito dos juros compostos ao longo do te function fmtPct(v) {

function fmtBRL(v) {
  if (v === null || v === undefined) return "—";
  return "R$ " + v.toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
// Markdown leve pro speech (títulos ###, negrito **, listas)
function mdLeve(txt) {
  if (!txt) return "";
  let h = esc(txt);
  h = h.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  h = h.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  h = h.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  return h;
}

  let html = `<div class="chip ${filtroClasse===null?'ativo':''}" onclick="setFiltro(null)">Todos</div>`;
  for (const c of CLASSES) {
    html += `<div class="chip ${filtroClasse===c?'ativo':''}" onclick="setFiltro('${esc(c)}')">${esc(c)}</div>`;
  }
  cont.innerHTML = html;
}
function setFiltro(c) { filtroClasse = c; render(); }

function fundoVisivel(f) {
  if (filtroClasse && f.classe_santander !== filtroClasse) return false;
  if (termoBusca) {
    const alvo = (f.nome + " " + f.gestora + " " + f.estrategia + " " + f.classe_santander).toLowerCase();
    if (!alvo.includes(termoBusca)) return false;
  }
  return true;
}

function cardHTML(f, idx) {
  let fiscal = "";
  if (f.isento_ir === true) fiscal += `<span class="tag-fiscal tag-isento">Isento IR</span>`;
  if (f.tem_come_cotas === true) fiscal += `<span class="tag-fiscal tag-comecota">Come-cotas</span>`;

  let body = `<div class="linha"><span class="k">Gestora</span><span class="v">${esc(f.gestora)||"—"}</span></div>`;
  body += `<div class="linha"><span class="k">Classe ANBIMA</span><span class="v">${esc(f.classe_anbima)||"—"}</span></div>`;
  body += `<div class="linha"><span class="k">Taxa adm</span><span class="v">${fmtPct(f.taxa_adm)}</span></div>`;
  if (f.taxa_perf) body += `<div class="linha"><span class="k">Taxa perf</span><span class="v">${esc(f.taxa_perf)}</span></div>`;
  if (f.cotizacao) body += `<div class="linha"><span class="k">Cotização</span><span class="v">${esc(f.cotizacao)}</span></div>`;
  if (f.liquidacao) body += `<div class="linha"><span class="k">Liquidação</span><span class="v">${esc(f.liquidacao)}</span></div>`;
  if (f.aplicacao_minima) body += `<div class="linha"><span class="k">Aplic. mínima</span><span class="v">${fmtBRL(f.aplicacao_minima)}</span></div>`;
  if (f.publico_alvo) body += `<div class="linha"><span class="k">Público</span><span class="v">${esc(f.publico_alvo)}</span></div>`;
  if (f.cnpj) body += `<div class="linha"><span class="k">CNPJ</span><span class="v">${esc(f.cnpj)}</span></div>`;
  if (fiscal) body += `<div style="margin-top:8px">${fiscal}</div>`;

  if (f.estrategia) body += `<div class="secao-titulo">Estratégia</div><div style="font-size:13.5px">${esc(f.estrategia)}</div>`;
  if (f.pros && f.pros.length) {
    body += `<div class="secao-titulo">Prós</div><ul class="pros pros-contras">`;
    for (const p of f.pros) body += `<li>${esc(p)}</li>`;
    body += `</ul>`;
  }
  if (f.contras && f.contras.length) {
    body += `<div class="secao-titulo">Contras</div><ul class="contras pros-contras">`;
    for (const c of f.contras) body += `<li>${esc(c)}</li>`;
    body += `</ul>`;
  }
  if (f.speech_comercial) {
    body += `<div class="secao-titulo">🎤 Speech comercial</div><div class="speech">${mdLeve(f.speech_comercial)}</div>`;
  }

  return `<div class="card" id="card${idx}">
    <div class="card-head" onclick="toggle(${idx})">
      <div>
        <div class="card-nome">${esc(f.nome)}</div>
        <div class="card-meta">${esc(f.gestora)||"—"} · taxa ${fmtPct(f.taxa_adm)}${f.speech_comercial?" · 🎤 speech":""}</div>
        <span class="badge">${esc(f.classe_santander)}</span>
      </div>
      <span class="seta">▶</span>
    </div>
    <div class="card-body">${body}</div>
  </div>`;
}

function toggle(idx) {
  document.getElementById("card"+idx).classList.toggle("aberto");
}

function render() {
  const lista = document.getElementById("lista");
  const visiveis = FUNDOS.filter(fundoVisivel);
  document.getElementById("contador").textContent =
    visiveis.length + " fundo(s)" + (filtroClasse ? " em " + filtroClasse : "");
  if (!visiveis.length) {
    lista.innerHTML = `<div class="vazio">Nenhum fundo encontrado.<br>Tente outra busca ou filtro.</div>`;
    return;
  }
  lista.innerHTML = visiveis.map((f, i) => cardHTML(f, FUNDOS.indexOf(f))).join("");
}

document.getElementById("busca").addEventListener("input", e => {
  termoBusca = e.target.value.trim().toLowerCase();
  render();
});

renderFiltros();
render();
</script>
</body>
</html>
