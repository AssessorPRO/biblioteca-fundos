 "Aplicação e resgate mínimos baixos (R$ 100,00), com ampla acessibilidade ao investidor geral", "Aplicação e resgate com cotização D+0 e crédito D+1, conferindo boa liquidez ao investidor", "Curvas de juros com prêmios atrativos embutidos, favorecendo ativos prefixados no cenário atual", "Benchmark IRF-M bem definido, com histórico de desempenho consistente e próximo ao índice", "Taxa global máxima baixa de 0,50% a.a. e ausência de taxa de performance", "Aplicação mínima acessível de R$ 100,00, adequada a investidores em geral"], "contras": ["Fundo com histórico curto (início em junho/2025), limitando análise de desempenho em diferentes ciclos", "Patrimônio líquido médio baixo (R$ 9 MM em 12 meses), o que pode indicar risco de liquidez e menor diluição de custos", "Fundo consistentemente abaixo do benchmark IRF-M em todos os períodos divulgados (diferença de -0,19% no ano de 2026)", "Alta volatilidade para renda fixa (3,26% ao ano), com retorno negativo registrado em março/2026 (-0,68%), típico da exposição a prefixados em cenário de alta de juros", "Volatilidade relevante para renda fixa (3,39% ao ano), com histórico de mês negativo (-0,68% em março/2026), indicando risco de mercado de duration", "Não há garantia de tratamento tributário para fundos de longo prazo, podendo haver incidência de come-cotas semestralmente", "Retornos sistematicamente abaixo do IRF-M em todos os períodos comparados (delta negativo recorrente)", "Risco de mercado elevado para prefixados em ambiente de inflação persistente e comunicação cautelosa do Copom", "Volatilidade de 3,47% nos últimos 12 meses, com mês de retorno negativo (-0,68% em abr/26), refletindo sensibilidade às oscilações das taxas de juros prefixadas", "PL médio mensal reduzido (R$ 15 MM), o que pode implicar menor liquidez da carteira em momentos de stress", "Fundo jovem (início em jun/2025), com histórico curto e sem longa série de dados para avaliação robusta de performance", "Desempenho consistentemente abaixo do benchmark IRF-M em quase todos os meses observados"], "isento_ir": null, "tem_come_cotas": null, "speech_comercial": "### 1. Elevator pitch (30 segundos)\n\nO Pré VIP Renda Fixa trava hoje exposição ao IRF-M — índice dos títulos públicos prefixados do Tesouro — com taxa total de apenas 0,50% a.a. e aplicação a partir de R$ 100, numa janela em que a Santander Asset está **overweight em prefixados longos** pela primeira vez em meses, apostando que a Selic cai de 14,50% para 13,25% até o fim de 2026 e os vértices longos da curva prefixada vão fechar com ganho de marcação a mercado relevante.\n\n---\n\n### 2. Versão 2 minutos (reunião curta)\n\n**Por que AGORA**\n\nA Carta Mensal de Maio/2026 da Santander Asset formalizou uma realocação tática: saíram de prefixados curtos e reforçaram prefixados longos, exatamente a ponta onde esse fundo opera. A premissa é que o mercado está subprecificando o ciclo de cortes — a curva DI embute apenas ~14% de Selic ao final de 2026, enquanto a própria casa projeta 13,25%. Essa diferença de ~75 bps entre o que o mercado precifica e o que a Santander Asset espera é o prêmio disponível hoje em títulos como NTN-F e LTN, os dois principais ativos da carteira (juntos respondem por cerca de 47% do portfólio).\n\n**Estratégia e diferencial**\n\nO fundo é um feeder do Santander IRF-M Títulos Públicos RF FIF RL — acesso indireto ao IRF-M (índice de renda fixa prefixada do Tesouro) com carteira composta por LTN, NTN-F, LFT e compromissadas. A visão do gestor é neutra a positiva para juros locais: mantém duration em prefixados, sem apostas alavancadas, dentro de carteira exclusivamente de títulos públicos federais. É uma forma limpa e de baixo custo de capturar fechamento de curva prefixada — sem risco de crédito, sem emissores privados.\n\n**Retorno vs. benchmark**\n\n| Período | Fundo | IRF-M | Delta |\n|---|---|---|---|\n| 2026 (ano) | abaixo do benchmark | IRF-M | -0,19 p.p. |\n| Mês negativo (mar/26) | -0,68% | — | — |\n| Volatilidade 12m | 3,47% a.a. | — | — |\n\nO fundo tem entregado sistematicamente ligeiramente abaixo do IRF-M (delta negativo recorrente, principalmente pela taxa de administração), o que é o comportamento esperado de um fundo indexado. O retorno absoluto potencial está no movimento do próprio índice — não em geração de alfa ativa.\n\n**Pra quem é**\n\nPerfil moderado a arrojado, horizonte mínimo de 12 meses (prefixado oscila no curto prazo), sem restrição de ticket — aplicação mínima de R$ 100. Público-alvo geral, mas a lógica da posição é de quem quer capturar fechamento de curva prefixada num ciclo de cortes de Selic.\n\n**Custos e liquidez**\n\n- Taxa de administração (global máxima): **0,50% a.a.**\n- Taxa de performance: **nenhuma**\n- Cotização do resgate: **D+0**\n- Liquidação financeira: **D+1**\n\n---\n\n### 3. Versão 5 minutos (conteúdo adicional)\n\n**Cenário macro completo e implicação direta para o fundo**\n\nO contexto que torna a tese prefixada interessante — e ao mesmo tempo desafiadora — está em dois vetores simultâneos. O choque do Brent acima de US$ 100/barril pressionou o IPCA projetado para 4,8%-4,9% em 2026 (consenso entre Santander Asset, Santander, XP e BTG), o que levou o Copom a cortar apenas 25 bps em abril, encerrando em 14,50%, e comunicar tom cauteloso. A curva DI foi represada: precifica apenas ~dois cortes adicionais até dezembro. É exatamente nessa repressão que está o prêmio. Se o petróleo ceder (a curva futura já está em backwardation, apontando recuo — BTG), a inflação implícita cai, as expectativas se re-ancoram e os vértices prefixados médios/longos fecham rapidamente. Para esse fundo, que carrega NTN-F e LTN, esse fechamento de curva se traduz em ganho de marcação a mercado — é a mecânica central da tese. A divergência entre casas na Selic fim-2026 (12,50% Santander vs. 14% curva de mercado) quantifica o tamanho da oportunidade: quem estiver certo, o retorno adicional capturado pelos prefixados longos pode ser expressivo.\n\n**Comportamento sob estresse**\n\nO pior cenário para o fundo é exatamente o que aconteceu em março/2026: escalada geopolítica ou inflação persistente forçam o mercado a reprecificar Selic para cima, a curva prefixada abre e o fundo entrega retorno negativo — como ocorreu (-0,68% no mês). A volatilidade de 3,47% a.a. é elevada para renda fixa convencional: um fundo DI puro teria volatilidade próxima de zero. O perfil de risco aqui é de \"renda fixa com marcação a mercado\" — pode ter meses negativos, especialmente em choques de curva. A recuperação histórica, quando o cenário volta ao trilho, tende a ser relativamente rápida em ciclos de juros — mas o cliente precisa estar preparado para suportar drawdowns de curto prazo sem resgatar.\n\n**Tributação**\n\n⚠️ O campo `isento_ir` não foi preenchido na lâmina cadastrada, e os contras do fundo explicitam que \"não há garantia de tratamento tributário para fundos de longo prazo, podendo haver incidência de come-cotas semestralmente.\" Portanto: **confirme na lâmina antes da reunião.** Se houver come-cotas (provável para fundo RF aberto), haverá antecipação de IR nos meses de maio e novembro (~15% do rendimento acumulado × 2 vezes ao ano), o que corrói parte do carrego. Tabela regressiva padrão: 22,5% até 180 dias → 15% acima de 720 dias. Para um cliente com horizonte de mais de 2 anos, a alíquota marginal cai para 15% — o que ainda é desfavorável em relação a CRI/CRA/LCI/LCA isentos, mas o diferencial de retorno bruto do ativo prefixado pode compensar dependendo da taxa travada.\n\n**Comparação com alternativas de classe**\n\nVersus um ETF de IRF-M passivo de baixo custo, esse fundo entrega exposição equivalente com cotização D+0/liquidação D+1 — vantagem operacional relevante para quem precisa de agilidade. Versus um título NTN-F comprado diretamente no Tesouro Direto, o fundo oferece diversificação de vencimentos e gestão de duration pelo Asset, mas adiciona a camada de taxa de administração de 0,50% a.a. e o risco de come-cotas que o TD não tem (no TD, o IR é pago apenas no vencimento ou resgate). Para volumes maiores, a compra direta de NTN-F pode ser mais eficiente tributariamente — vale comparar o retorno líquido projetado caso a caso.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"O fundo sempre fica abaixo do IRF-M — por que não comprar o índice direto?\"**\nO delta negativo recorrente é a taxa de administração de 0,50% a.a. sendo precificada — não é ineficiência do gestor. O fundo entrega o IRF-M menos o custo, que é exatamente o que um fundo indexado deve fazer. A questão real é: você quer exposição ao IRF-M com liquidez D+1 e aplicação mínima de R$ 100, ou prefere montar isso via Tesouro Direto com IR diferido? Se a resposta for Tesouro Direto, esse fundo de fato perde em eficiência tributária para o investidor que consegue manter até o vencimento.\n\n**\"Teve mês negativo em março/2026. Renda fixa não pode ter mês negativo.\"**\nRenda fixa prefixada *pode* ter mês negativo — e é esperado que tenha em cenários de abertura de curva. O que esse fundo não tem é risco de crédito (100% títulos públicos federais) nem risco de inadimplência. O risco aqui é de mercado puro: se a Selic sobe além do esperado, a NTN-F cai no marcado. A pergunta correta não é \"pode cair?\", mas \"o prêmio disponível hoje compensa o risco de duration?\" — com a curva precificando 14% de Selic e a casa projetando 13,25%, a resposta das quatro casas é sim.\n\n**\"PL de R$ 15 MM é muito pequeno. Risco de gate ou liquidação do fundo.\"**\nÉ um ponto de atenção legítimo. PL pequeno aumenta o risco de descontinuidade e reduz a diluição de custos operacionais. O mitigante prático: o fundo é feeder de um veículo maior (Santander IRF-M Títulos Públicos RF FIF RL), o que significa que a gestão da carteira e a liquidez dos ativos estão no fundo master, não nesse wrapper. O risco real é de o fundo wrapper ser encerrado por baixa adesão — nesse caso, o cotista seria migrado para o master ou receberia o resgate. Recomendo confirmar com o gestor a política de encerramento antes de aportes relevantes.\n\n**\"O fundo tem histórico de apenas ~1 ano (início jun/2025). Não dá para avaliar.\"**\nCorreto — e é o contraponto mais honesto. Não temos como avaliar o comportamento do fundo em mais de um ciclo de juros completo. O que temos é a estratégia declarada (indexada ao IRF-M), o gestor (Santander Asset, com track record institucional no índice) e a carteira atual. Para quem precisa de histórico longo, esse fundo não atende — nesse caso, prefixados longos via Tesouro Direto ou um veículo com mais anos de série histórica são alternativas mais adequadas.\n\n**\"Já tenho LCI/LCA prefixada com isenção de IR. Por que trocar?\"**\nNão é uma troca — é uma complementação. LCI/LCA prefixada isenta resolve o problema de tributação, mas tem carência de 90 a 365 dias e não oferece a cotização D+0/liquidação D+1 desse fundo. Se você precisar de liquidez num cenário de stress ou quiser rebalancear rapidamente a posição prefixada, o fundo opera com mais agilidade. Além disso, o fundo opera exclusivamente em títulos públicos, sem risco de crédito do banco emissor da LCI/LCA — argumento relevante para carteiras com concentração bancária.\n\n**\"E se o petróleo ficar acima de US$ 100 e a Selic não cair como projetado?\"**\nEsse é o cenário adverso central. Se o Copom interromper o ciclo — ou pior, reverter — a curva prefixada abre e o fundo perde no marcado, como já aconteceu em março/26. A tese não é livre de risco. O que mitiga: (a) a curva DI já precifica apenas dois cortes adicionais, ou seja, já é conservadora — uma pausa no ciclo pode não abrir a curva muito além do que já está precificado; (b) a carteira inclui LFT (pós-fixada), que atua como amortecedor em cenários de stress nas taxas prefixadas. O fundo não é all-in em prefixado puro.\n\n---\n\n### 5. Ângulo comercial pra cada perfil API\n\n**Conservador:** ❌ Não recomendado. A volatilidade de 3,47% a.a. e o histórico de meses negativos são incompatíveis com o mandato de preservação de capital de curto prazo — um fundo DI ou IPCA+ curto cumpre melhor esse papel sem expor o cliente a risco de marcação a mercado.\n\n**Moderado:** O ângulo aqui é de complemento a uma base pós-fixada: até 10-15% da carteira em prefixado captura o prêmio disponível na curva sem comprometer o carrego do restante. Funciona como \"aposta calibrada\" no ciclo de cortes, com liquidez de saída em D+1 se o cenário mudar.\n\n**Balanceado:** Alinhado à realocação tática da Carta Mensal Santander Asset de maio/26 — a própria casa reduziu prefixados curtos e reforçou prefixados longos, que é o que o fundo entrega. Peso-alvo na faixa de 10-20% da parcela de renda fixa, complementando pós-fixado e IPCA+.\n\n**Arrojado:** Argumento de produtividade do capital: com a curva prefixada longa embutindo Selic terminal acima do que Santander Asset e BTG projetam, cada ponto de fechamento de curva gera retorno absoluto relevante via duration. É a forma mais eficiente de capturar o ciclo de cortes dentro da renda fixa, com liquidez operacional superior ao Tesouro Direto.\n\n**Agressivo:** Diversificação tática dentro da renda fixa doméstica — quem já tem posição em IPCA+ longo e pós-fixado adiciona prefixado como terceira perna, descorrelacionada em termos de driver de retorno (fechamento de curva nominal vs. inflação real vs. carrego). O veículo de baixo custo (0,50% a.a., sem performance) é eficiente para uma posição tática que pode ser desfeita rapidamente.", "ultima_atualizacao": "2026-06-15"}, {"nome": "RENDA FIXA MULTIESTRATEGIA CREDITO PRIVADO LONGO PRAZO CIC RESPONSABILIDADE LIMITADA", "cnpj": "52337734000164", "gestora": "Santander Asset Management", "tipo": "RF", "classe_anbima": "Renda Fixa Duração Livre Grau de Investimento", "classe_santander": "Prefixados", "taxa_adm": 0.009, "taxa_perf": "20% sobre o que exceder o CDI", "cotizacao": "D+14", "liquidacao": "D+15", "aplicacao_minima": 100.0, "publico_alvo": "Geral", "estrategia": "Fundo de Renda F struturalmente: 68% em crédito privado referenciado DI + 14% em compromissadas + 5% em LFT como colchão de liquidez. Com Selic a 14,50% e projeção da própria casa de encerramento em 13,25% ao fim de 2026, o carrego atual é o mais atrativo em termos reais da última década; ao mesmo tempo, os spreads de crédito privado abriram acima da média histórica — criando ponto de entrada interessante em high grade. O fundo captura os dois vetores simultaneamente, dentro de um arcabouço grau de investimento.\n\n**Estratégia e diferencial**\n\nO fundo opera gestão ativa de renda fixa: o núcleo (68%) é um fundo de crédito privado referenciado DI — captura spread de crédito sobre o CDI em ativos corporativos high grade; os 13% em NTN-B adicionam proteção real contra o IPCA projetado em 4,8% para 2026; compromissadas (14%) e LFT (5%) garantem manejo de liquidez interna. O diferencial frente a um DI simples está exatamente nesse spread de crédito ativo — a gestão Santander Asset seleciona emissores e prazo, não apenas replica o overnight.\n\n**Retorno vs benchmark**\n\n| Período | Fundo | CDI |\n|---|---|---|\n| 2025 (ano) | 95,65% do CDI | 100% |\n| 24 meses acum. | **27,97%** | 23,05% |\n\nVolatilidade de 2,84% a.a. nos últimos 12 meses — acima da média da categoria, reflexo da duration ativa e do crédito privado, o que é esperado e precificado.\n\n**Pra quem é**\n\nPerfil API Moderado a Arrojado; horizonte mínimo de 18-24 meses para que o spread de crédito ativo se realize; aplicação mínima de R$ 100 — praticamente sem barreira de entrada.\n\n**Custos e liquidez**\n\nTaxa de administração: **0,90% a.a.**; taxa de performance: **20% sobre o que exceder o CDI**. Cotização em D+14, liquidação D+15 — *não é caixa de curto prazo*; o investidor precisa ter liquidez garantida em outro vértice da carteira para eventuais necessidades imediatas.\n\n---\n\n### 3. Versão 5 minutos (apenas conteúdo adicional)\n\n**Cenário macro completo — o que reforça a tese hoje**\n\nO conflito EUA-Irã empurrou o Brent acima de US$ 100/barril (+80,5% em 12 meses, Santander Asset), forçando todas as quatro casas consultadas a revisar IPCA 2026 para o intervalo de 4,8%-4,9% — bem acima da meta de 3,0%. O Copom respondeu com corte de apenas 25 bps para 14,50% e comunicado explicitamente hawkish, e a curva DI precifica apenas dois cortes adicionais até dezembro (BTG). Para *este fundo especificamente*, esse ambiente é favorável em dois eixos: (1) Selic elevada por mais tempo amplia o carrego bruto do CDI que o núcleo de crédito privado replica; (2) spreads de crédito high grade abertos acima da média histórica — XP cita IDEX-INFRA a 58 bps vs. média de 42 bps — aumentam o prêmio incremental que a gestão ativa captura sobre o overnight puro. O risco, igualmente reconhecido pelas casas, é que nenhuma delas está *overweight* em crédito privado neste mês — exatamente por esse ambiente de aversão a risco; por isso a alocação segue grau de investimento com seletividade.\n\n**Comportamento sob estresse**\n\nO pior cenário para essa estratégia é uma crise de liquidez em crédito privado — abertura abrupta de spreads, vendas forçadas de debêntures e CRIs no secundário, como ocorreu parcialmente em março/2026 (fundo registrou **-0,28% no mês**) e de forma mais pronunciada em 2024, quando o fundo entregou apenas **64,91% do CDI no ano** (7,06% vs 10,87% do benchmark). Esse é o ponto de honestidade obrigatória: fundo de crédito privado com duration ativa *pode* ter meses negativos em renda fixa — o investidor precisa estar confortável com isso. A recuperação histórica após estresses de crédito high grade tende a ser gradual mas consistente, à medida que os spreads fecham com o retorno do apetite por risco. O D+14 de cotização, que parece desvantagem, funciona aqui como proteção implícita: evita saques em pânico que forçariam venda de ativos ilíquidos a desconto.\n\n**Mecânica tributária**\n\nFundo aberto de renda fixa com **come-cotas semestral**, recolhido automaticamente em maio e novembro à alíquota de **15%** — o \"drag\" é de aproximadamente 15% do rendimento bruto duas vezes ao ano, antecipando o IR antes do resgate. Na tabela regressiva, quem mantiver por mais de 720 dias atinge a alíquota mínima de **15%** — o come-cotas já recolhe nessa alíquota mínima, portanto não há benefício adicional de carência tributária além desse patamar. Para o cliente que compara com LCI/LCA isentas: a conta correta é comparar o retorno líquido real; com CDI em 14,50%, um fundo gerando CDI+0,5% líquido de come-cotas ainda supera LCI a 90% do CDI dependendo do prazo e emissor.\n\n**Comparação com alternativas da classe**\n\nFrente a um DI puro sem crédito (ex.: fundo referenciado DI bancário), esse fundo paga um prêmio de spread pela exposição a crédito corporativo — historicamente entre 0,3% e 0,8% a.a. acima do CDI em períodos de normalidade, mas com drawdowns possíveis em estresse. Frente a um IMA-B passivo, a estratégia carrega menos duration e menos risco de marcação a mercado em movimentos de alta de juros, mas também captura menos o fechamento da curva real em cenários de desinflação acelerada. O posicionamento ideal é como *satélite* de um portfólio que já tem o núcleo em pós-fixado puro — o fundo adiciona spread sem escalar risco de duration de forma agressiva.\n\n---\n\n### 4. Objeções esperadas + respostas\n\n**\"Taxa de administração de 0,90% mais 20% de performance é caro para renda fixa.\"**\nO 0,90% cobre gestão ativa de crédito — análise de emissores, monitoramento de covenant, negociação de prazo e spread. A performance de 20% sobre CDI só é paga quando o fundo *entrega acima do benchmark*; nos 24 meses em que entregou 27,97% vs 23,05% do CDI, o custo total foi compensado pelo alfa gerado. A comparação correta não é com um DI passivo que cobra 0,15% — é com o retorno líquido depois de todo custo, e aí os 24 meses favorecem o fundo.\n\n**\"Em 2024 o fundo entregou só 64,91% do CDI — isso é inaceitável para renda fixa.\"**\nPonto real, não tem como suavizar. 2024 foi um ano de estresse específico no mercado de crédito privado — abertura de spreads, saques da indústria, venda forçada de ativos. O fundo sentiu porque tem 68% em crédito. A pergunta relevante é: o ambiente de hoje — spreads abertos, gestão mais seletiva, Selic alta que amplia carrego — é o mesmo de 2024? As casas convergem que spreads voltaram a nível atrativo e que o estresse foi em grande parte corrigido. Quem entrou agora compra o prêmio de recuperação, não o pico do estresse.\n\n**\"D+14 é muito longo — preciso de liquidez.\"**\nCorreto, e não deve ser posicionado como reserva de liquidez. A função dele na carteira é de *satélite de crédito ativo*, com horizonte de 18-24 meses. A liquidez imediata fica no vértice pós-fixado de resgate D+0/D+1 — as duas peças têm papéis diferentes e não se substituem.\n\n**\"Volatilidade de 2,84% a.a. para um fundo de renda fixa é alta.\"**\nÉ alta para um DI puro, não para crédito privado com duration ativa. Essa volatilidade reflete a marcação a mercado das NTN-Bs (13%) e a variação de spread dos créditos. Em troca, o fundo entregou 4,92 pontos percentuais a mais que o CDI em 24 meses. O trade-off volatilidade/retorno é favorável no período — e o nível de 2,84% ainda está bem abaixo de qualquer fundo multimercado ou renda variável.\n\n**\"Já tenho um fundo DI de crédito privado do próprio Santander — qual é a diferença?\"**\nO Multiestratégia *contém* um fundo DI de crédito como núcleo, mas adiciona as camadas de NTN-B (inflação real), LFT e gestão ativa de duration — é uma versão com mais graus de liberdade. Se o fundo DI de crédito que você já tem é o SANTANDER MULTIESTRATÉGIA RF CP LONGO PRAZO FIF-RL (o fundo investido), tecnicamente você está sobrepondo posições. Vale verificar o CNPJ do fundo atual antes de alocar.\n\n**\"E se o crédito privado sofrer outro estresse como 2024?\"**\nCenário possível, não improvável — a própria síntese macro cita que nenhuma casa está overweight em crédito neste mês. A mitigação está em três camadas: (1) o fundo opera exclusivamente grau de investimento — emissores com menor probabilidade de default; (2) o D+14 protege contra saques de pânico que amplifiam o estresse; (3) o tamanho da posição na carteira deve ser calibrado para que um drawdown de 1%-2% no fundo não seja material no portfólio total. Posição de satélite — não de núcleo.\n\n---\n\n### 5. Ângulo comercial por perfil API\n\n**Conservador:** ❌ Não recomendado como posição principal. A volatilidade de 2,84% a.a. e o D+14 de cotização contrariam o perfil de preservação de capital com liquidez — em 2024 o fundo ficou abaixo do CDI por todo o ano. Pode figurar em alocação residual (<5%) apenas se o cliente já tiver o núcleo em pós-fixado de alta liquidez bem estabelecido.\n\n**Moderado:** O ângulo aqui é complemento ao núcleo DI — o fundo adiciona spread de crédito ativo sem escalar para renda variável. Peso sugerido de 5%-10% da carteira de renda fixa, como camada de retorno incremental sobre o CDI puro, com ciência do prazo de resgate.\n\n**Balanceado:** Alinhado com o posicionamento Santander de pós-fixados overweight + crédito seletivo neutro; pode compor 10%-15% da fatia de renda fixa, complementando o núcleo pós-fixado de liquidez e a proteção inflacionária via IPCA+. O fundo entrega a camada de crédito que o perfil balanceado precisa sem adicionar risco de duration agressivo.\n\n**Arrojado:** O argumento é produtividade de capital: com spreads de crédito high grade em nível historicamente acima da média, a relação retorno/risco do crédito ativo melhora neste ponto de entrada. Até 15%-20% da parcela de renda fixa, aceitando o drawdown eventual como custo do carry adicional.\n\n**Agressivo:** Uso tático de diversificação dentro da parcela de renda fixa — evita concentração em um único instrumento pós-fixado e captura o spread de crédito corporativo como fonte de retorno descorrelacionada do risco de bolsa. Peso contido (até 10%-15%) dado que o perfil já carrega risco em RV; a função aqui é carrego de qualidade, não motor de retorno.", "ultima_atualizacao": "2026-06-15"}, {"nome": "SANTANDER PREV DIRECIONAL RENDA FIXA CIC FIF RESP LIMITADA", "cnpj": "52047967000122", "gestora": "Santander Asset Management", "tipo": "Previdência", "classe_anbima": "Previdência RF Duração Livre Grau de Investimento", "classe_santander": "Prefixados", "taxa_adm": 0.008, "taxa_perf": "20% sobre o que exceder 100% do IMA ex-C", "cotizacao": "D+0", "liquidacao": "D+1 (após cotização no fundo; disponibilização pela Seguradora em até 10 dias úteis)", "aplicacao_minima": null, "publico_alvo": "Profissional", "estrategia": "Fundo de previdência (PGBL/VGBL) com gestão ativa em renda fixa, que investe por meio de fundos da Santander Asset acessando títulos prefixados (IRF-M ~28%), indexados ao CDI (~22%), NTN-B/IMA-B (~18%) e estratégias de prazo médio (~21%). Busca superar o IMA Geral ex-C no longo prazo sem exposição a crédito privado, ajustando dinamicamente a alocação entre prefixados, inflação e pós-fixados conforme o cenário macro.", "pros": ["Ausência de exposição a crédito privado, reduzindo risco de inadimplência e rebaixamento de rating", "Diversificação entre estratégias prefixadas, indexadas à inflação e ao CDI dentro de um único fundo", "Benchmark IMA Geral ex-C oferece potencial de retorno superior ao CDI em cenário de queda de juros", "Fundo de previdência isento de tributação no nível do fundo, com diferimento fiscal para o investidor", "Diversificação entre estratégias de juros reais (NTN-B/IMA-B), prefixados (IRF-M) e pós-fixados (RF Ref DI)", "Benchmark IMA Geral ex-C, adequado para capturar prêmios em cenário de juros atrativos", "PL médio expressivo (R$ 273 MM no mês), indicando boa liquidez operacional do fundo", "Exposição diversificada a títulos públicos prefixados, indexados à inflação e ao CDI, sem risco de crédito privado", "Superou o benchmark IMA ex-C nos últimos 12 meses (9,87% vs 11,19% — benchmark superior, mas fundo com difere
